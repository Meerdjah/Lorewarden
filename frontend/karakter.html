<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorewarden — Manajemen Karakter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { background:#0d0d1a; color:#e8e8e8; font-family:Georgia,'Times New Roman',serif; }
    .gold { color:#c9a227; }
    .bg-card { background:#16213e; border:1px solid #2a2a4a; }
    .bg-card:hover { border-color:#c9a227; transition:border-color .2s; }
    .btn-gold { background:linear-gradient(135deg,#c9a227,#8b6914); color:#fff; border:none; cursor:pointer; transition:.2s; }
    .btn-gold:hover { background:linear-gradient(135deg,#e8c547,#c9a227); }
    .btn-blue { background:#1e3a5f; color:#93c5fd; cursor:pointer; }
    .btn-blue:hover { background:#1e40af; color:#fff; }
    .input-dark { background:#0f172a; border:1px solid #334155; color:#e8e8e8; border-radius:6px; padding:8px 12px; width:100%; }
    .input-dark:focus { outline:none; border-color:#c9a227; }
    select.input-dark option { background:#0f172a; }
    .stat-input { background:#0f172a; border:1px solid #334155; color:#e8e8e8; border-radius:6px; padding:6px; text-align:center; width:70px; }
    .stat-input:focus { outline:none; border-color:#c9a227; }
    .mod-badge { font-size:11px; color:#94a3b8; text-align:center; margin-top:2px; }
    .toast { position:fixed; bottom:24px; right:24px; z-index:9999; padding:12px 20px; border-radius:8px; font-size:14px; animation:fadeIn .3s; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:100; display:flex; align-items:center; justify-content:center; overflow-y:auto; padding:20px; }
    .modal-box { background:#1a1a2e; border:1px solid #c9a227; border-radius:12px; padding:28px; width:90%; max-width:640px; max-height:90vh; overflow-y:auto; }
    .img-preview { width:80px; height:80px; object-fit:cover; border-radius:8px; border:2px solid #334155; }
    ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0d0d1a}::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
  </style>
</head>
<body>

<nav class="border-b border-yellow-900 px-6 py-4 flex items-center justify-between" style="background:#12122a">
  <a href="/" class="text-2xl font-bold gold tracking-widest">⚔ LOREWARDEN</a>
  <div class="flex gap-6 text-sm">
    <a href="/"              class="text-gray-400 hover:text-yellow-400">Dashboard</a>
    <a href="/karakter.html" class="gold font-semibold border-b border-yellow-600 pb-1">Karakter</a>
    <a href="/session.html"  class="text-gray-400 hover:text-yellow-400">Sesi Bermain</a>
  </div>
</nav>

<div class="px-6 py-8 border-b border-gray-800" style="background:linear-gradient(135deg,#12122a,#1a1a2e)">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-3xl font-bold gold">Manajemen Karakter</h1>
      <p class="text-gray-400 mt-1 text-sm">Buat dan kelola karakter TRPG beserta atribut statistiknya</p>
    </div>
    <button onclick="openModal()" class="btn-gold px-5 py-2.5 rounded-lg font-semibold text-sm">
      <i class="fas fa-plus mr-2"></i>Buat Karakter
    </button>
  </div>
</div>

<!-- Filter bar -->
<div class="px-6 py-4 flex gap-3 items-center border-b border-gray-800" style="background:#12122a">
  <label class="text-sm text-gray-400">Filter Pemain:</label>
  <select id="filter-pemain" class="input-dark w-48 text-sm" onchange="loadKarakter()">
    <option value="">Semua Pemain</option>
  </select>
  <span class="text-sm text-gray-500" id="karakter-count"></span>
</div>

<!-- Character Grid -->
<div class="px-6 py-6">
  <div id="karakter-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
</div>

<!-- Modal Buat/Edit Karakter -->
<div id="modal-karakter" class="modal-overlay hidden">
  <div class="modal-box">
    <h3 class="text-xl font-bold gold mb-6" id="modal-title">Buat Karakter Baru</h3>
    <input type="hidden" id="kar-id">

    <!-- Gambar -->
    <div class="mb-5 flex gap-4 items-center">
      <img id="img-preview" class="img-preview hidden">
      <div class="flex-1">
        <label class="text-sm text-gray-400 block mb-1">Foto Karakter</label>
        <input type="file" id="kar-gambar" accept="image/*" class="text-sm text-gray-300" onchange="previewImg(this)">
        <p class="text-xs text-gray-600 mt-1">Max 5MB · JPG, PNG, GIF, WebP</p>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-4">
      <div>
        <label class="text-sm text-gray-400 block mb-1">Pemain *</label>
        <select id="kar-pemain" class="input-dark">
          <option value="">Pilih Pemain</option>
        </select>
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1">Nama Karakter *</label>
        <input type="text" id="kar-nama" class="input-dark" placeholder="Thorin Oakenshield">
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1">Race *</label>
        <select id="kar-race" class="input-dark">
          <option value="">Pilih Race</option>
          <option>Human</option><option>Elf</option><option>Dwarf</option><option>Halfling</option>
          <option>Gnome</option><option>Half-Orc</option><option>Half-Elf</option>
          <option>Tiefling</option><option>Dragonborn</option><option>Aasimar</option><option>Lainnya</option>
        </select>
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1">Class *</label>
        <select id="kar-class" class="input-dark">
          <option value="">Pilih Class</option>
          <option>Barbarian</option><option>Bard</option><option>Cleric</option><option>Druid</option>
          <option>Fighter</option><option>Monk</option><option>Paladin</option><option>Ranger</option>
          <option>Rogue</option><option>Sorcerer</option><option>Warlock</option><option>Wizard</option>
        </select>
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1">Level</label>
        <input type="number" id="kar-level" class="input-dark" min="1" max="20" value="1">
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1">Max HP</label>
        <input type="number" id="kar-maxhp" class="input-dark" min="1" value="10">
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1">Background</label>
        <select id="kar-bg" class="input-dark">
          <option value="">Pilih Background</option>
          <option>Acolyte</option><option>Criminal</option><option>Folk Hero</option><option>Noble</option>
          <option>Outlander</option><option>Sage</option><option>Soldier</option><option>Urchin</option>
          <option>Charlatan</option><option>Entertainer</option><option>Guild Artisan</option><option>Hermit</option>
        </select>
      </div>
      <div>
        <label class="text-sm text-gray-400 block mb-1">Alignment</label>
        <select id="kar-align" class="input-dark">
          <option value="">Pilih Alignment</option>
          <option>Lawful Good</option><option>Neutral Good</option><option>Chaotic Good</option>
          <option>Lawful Neutral</option><option>True Neutral</option><option>Chaotic Neutral</option>
          <option>Lawful Evil</option><option>Neutral Evil</option><option>Chaotic Evil</option>
        </select>
      </div>
    </div>

    <!-- Atribut Stats -->
    <div class="mt-5 mb-4 p-4 rounded-lg" style="background:#0f172a;border:1px solid #1e3a5f">
      <p class="text-sm text-gray-400 mb-3 font-semibold">Ability Scores (1–30)</p>
      <div class="grid grid-cols-3 gap-3">
        <div class="text-center">
          <div class="text-xs text-red-400 font-bold mb-1">STR</div>
          <input type="number" id="stat-str" class="stat-input" min="1" max="30" value="10" oninput="updateMod('str',this.value)">
          <div class="mod-badge" id="mod-str">+0</div>
        </div>
        <div class="text-center">
          <div class="text-xs text-green-400 font-bold mb-1">DEX</div>
          <input type="number" id="stat-dex" class="stat-input" min="1" max="30" value="10" oninput="updateMod('dex',this.value)">
          <div class="mod-badge" id="mod-dex">+0</div>
        </div>
        <div class="text-center">
          <div class="text-xs text-yellow-400 font-bold mb-1">CON</div>
          <input type="number" id="stat-con" class="stat-input" min="1" max="30" value="10" oninput="updateMod('con',this.value)">
          <div class="mod-badge" id="mod-con">+0</div>
        </div>
        <div class="text-center">
          <div class="text-xs text-blue-400 font-bold mb-1">INT</div>
          <input type="number" id="stat-int" class="stat-input" min="1" max="30" value="10" oninput="updateMod('int',this.value)">
          <div class="mod-badge" id="mod-int">+0</div>
        </div>
        <div class="text-center">
          <div class="text-xs text-purple-400 font-bold mb-1">WIS</div>
          <input type="number" id="stat-wis" class="stat-input" min="1" max="30" value="10" oninput="updateMod('wis',this.value)">
          <div class="mod-badge" id="mod-wis">+0</div>
        </div>
        <div class="text-center">
          <div class="text-xs text-pink-400 font-bold mb-1">CHA</div>
          <input type="number" id="stat-cha" class="stat-input" min="1" max="30" value="10" oninput="updateMod('cha',this.value)">
          <div class="mod-badge" id="mod-cha">+0</div>
        </div>
      </div>
    </div>

    <div class="flex gap-3 justify-end mt-6">
      <button onclick="closeModal()" class="px-4 py-2 rounded-lg bg-gray-700 text-gray-300 hover:bg-gray-600 text-sm">Batal</button>
      <button onclick="saveKarakter()" class="btn-gold px-6 py-2 rounded-lg text-sm font-semibold">Simpan Karakter</button>
    </div>
  </div>
</div>

<!-- Modal Detail Karakter -->
<div id="modal-detail" class="modal-overlay hidden">
  <div class="modal-box" style="max-width:520px">
    <div class="flex justify-between items-start mb-4">
      <h3 class="text-xl font-bold gold" id="detail-nama">—</h3>
      <button onclick="closeDetail()" class="text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
    </div>
    <div id="detail-content"></div>
  </div>
</div>

<div id="toast-container"></div>

<script src="/js/api.js"></script>
<script>
  const STAT_LABELS = { str:'STR', dex:'DEX', con:'CON', int:'INT', wis:'WIS', cha:'CHA' };
  let allPemain = [], editingId = null, hasAtribut = false;

  const params = new URLSearchParams(location.search);
  const filterInit = params.get('pemain_id') || '';
  const editInit   = params.get('edit') || '';

  async function init() {
    try {
      const res = await api.getPemain();
      allPemain = res.data;
      const sel = document.getElementById('filter-pemain');
      const kps = document.getElementById('kar-pemain');
      allPemain.forEach(p => {
        sel.innerHTML += `<option value="${p.id}">${esc(p.username)}</option>`;
        kps.innerHTML += `<option value="${p.id}">${esc(p.username)}</option>`;
      });
      if (filterInit) sel.value = filterInit;
      await loadKarakter();
      if (editInit) await openModal(parseInt(editInit));
    } catch(e) { toast(e.message, 'error'); }
  }

  async function loadKarakter() {
    const pemainId = document.getElementById('filter-pemain').value;
    try {
      const res = await api.getKarakter(pemainId || null);
      const list = res.data;
      document.getElementById('karakter-count').textContent = `${list.length} karakter`;
      renderKarakter(list);
    } catch(e) { toast(e.message, 'error'); }
  }

  function renderKarakter(list) {
    const grid = document.getElementById('karakter-grid');
    if (!list.length) {
      grid.innerHTML = '<div class="col-span-3 text-center text-gray-500 py-16"><i class="fas fa-scroll text-4xl mb-3 block"></i>Belum ada karakter. Klik "Buat Karakter" untuk memulai.</div>';
      return;
    }
    const mod = s => Math.floor((s - 10) / 2);
    const fm  = m => (m >= 0 ? `+${m}` : `${m}`);

    grid.innerHTML = list.map(k => `
      <div class="bg-card rounded-xl overflow-hidden">
        <div class="flex">
          ${k.gambar_url
            ? `<img src="${k.gambar_url}" class="w-24 h-32 object-cover flex-shrink-0">`
            : `<div class="w-24 h-32 flex-shrink-0 flex items-center justify-center text-4xl" style="background:#0f172a">⚔</div>`
          }
          <div class="p-4 flex-1 min-w-0">
            <div class="flex items-start justify-between gap-2">
              <div class="font-bold text-yellow-300 truncate">${esc(k.nama_karakter)}</div>
              <div class="flex gap-1.5 flex-shrink-0">
                <button onclick="openModal(${k.id})" class="text-yellow-500 hover:text-yellow-300 text-xs"><i class="fas fa-edit"></i></button>
                <button onclick="hapusKarakter(${k.id})" class="text-red-500 hover:text-red-300 text-xs"><i class="fas fa-trash"></i></button>
              </div>
            </div>
            <div class="text-xs text-gray-400 mt-0.5">${esc(k.race)} · ${esc(k.class)} · Lv.${k.level}</div>
            <div class="text-xs text-gray-500">${esc(k.pemain_username)}</div>
            ${k.alignment ? `<div class="text-xs text-indigo-400 mt-1">${esc(k.alignment)}</div>` : ''}
            <div class="text-xs text-gray-400 mt-1">HP Max: <span class="text-green-400">${k.max_hp}</span></div>
          </div>
        </div>
        ${k.strength != null ? `
        <div class="px-4 py-3 border-t border-gray-700 grid grid-cols-6 gap-1 text-center">
          ${['strength','dexterity','constitution','intelligence','wisdom','charisma'].map((s, i) => {
            const labels = ['STR','DEX','CON','INT','WIS','CHA'];
            const colors = ['text-red-400','text-green-400','text-yellow-400','text-blue-400','text-purple-400','text-pink-400'];
            return `<div>
              <div class="text-xs ${colors[i]} font-bold">${labels[i]}</div>
              <div class="text-sm font-semibold">${k[s]}</div>
              <div class="text-xs text-gray-500">${fm(mod(k[s]))}</div>
            </div>`;
          }).join('')}
        </div>` : `<div class="px-4 py-2 text-xs text-gray-600 border-t border-gray-800">Belum ada atribut</div>`}
        <div class="px-4 py-3 border-t border-gray-800 flex gap-2">
          <a href="/session.html?karakter_id=${k.id}" class="flex-1 btn-gold text-center text-xs py-1.5 rounded-lg font-semibold">
            <i class="fas fa-play mr-1"></i>Mulai Sesi
          </a>
          <button onclick="showDetail(${k.id})" class="btn-blue px-3 py-1.5 rounded-lg text-xs">Detail</button>
        </div>
      </div>
    `).join('');
  }

  async function openModal(id = null) {
    editingId  = id;
    hasAtribut = false;
    resetForm();
    document.getElementById('modal-title').textContent = id ? 'Edit Karakter' : 'Buat Karakter Baru';
    document.getElementById('modal-karakter').classList.remove('hidden');

    if (id) {
      try {
        const res = await api.getKarakterById(id);
        const k   = res.data;
        document.getElementById('kar-id').value    = k.id;
        document.getElementById('kar-pemain').value = k.pemain_id;
        document.getElementById('kar-nama').value  = k.nama_karakter;
        document.getElementById('kar-race').value  = k.race;
        document.getElementById('kar-class').value = k.class;
        document.getElementById('kar-level').value = k.level;
        document.getElementById('kar-maxhp').value = k.max_hp;
        document.getElementById('kar-bg').value    = k.background || '';
        document.getElementById('kar-align').value = k.alignment  || '';

        if (k.gambar_url) {
          const prev = document.getElementById('img-preview');
          prev.src = k.gambar_url; prev.classList.remove('hidden');
        }

        if (k.strength != null) {
          hasAtribut = true;
          ['str','dex','con','int','wis','cha'].forEach((s, i) => {
            const keys = ['strength','dexterity','constitution','intelligence','wisdom','charisma'];
            const val  = k[keys[i]];
            document.getElementById(`stat-${s}`).value = val;
            updateMod(s, val);
          });
        }
      } catch(e) { toast(e.message, 'error'); }
    }
  }

  function resetForm() {
    ['kar-id','kar-nama','kar-gambar'].forEach(id => document.getElementById(id).value = '');
    ['kar-pemain','kar-race','kar-class','kar-bg','kar-align'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('kar-level').value = 1;
    document.getElementById('kar-maxhp').value = 10;
    document.getElementById('img-preview').classList.add('hidden');
    ['str','dex','con','int','wis','cha'].forEach(s => {
      document.getElementById(`stat-${s}`).value = 10;
      updateMod(s, 10);
    });
  }

  async function saveKarakter() {
    const id     = document.getElementById('kar-id').value;
    const pemain = document.getElementById('kar-pemain').value;
    const nama   = document.getElementById('kar-nama').value.trim();
    const race   = document.getElementById('kar-race').value;
    const cls    = document.getElementById('kar-class').value;
    if (!pemain || !nama || !race || !cls) return toast('Pemain, nama, race, dan class wajib diisi', 'error');

    const fd = new FormData();
    fd.append('pemain_id',    pemain);
    fd.append('nama_karakter',nama);
    fd.append('race',         race);
    fd.append('class',        cls);
    fd.append('level',        document.getElementById('kar-level').value);
    fd.append('max_hp',       document.getElementById('kar-maxhp').value);
    fd.append('background',   document.getElementById('kar-bg').value);
    fd.append('alignment',    document.getElementById('kar-align').value);
    const file = document.getElementById('kar-gambar').files[0];
    if (file) fd.append('gambar', file);

    try {
      let karakter;
      if (id) {
        const res = await api.updateKarakter(id, fd);
        karakter  = res.data;
      } else {
        const res = await api.createKarakter(fd);
        karakter  = res.data;
      }

      // Save/update atribut
      const stats = {
        karakter_id:  karakter.id,
        strength:     parseInt(document.getElementById('stat-str').value),
        dexterity:    parseInt(document.getElementById('stat-dex').value),
        constitution: parseInt(document.getElementById('stat-con').value),
        intelligence: parseInt(document.getElementById('stat-int').value),
        wisdom:       parseInt(document.getElementById('stat-wis').value),
        charisma:     parseInt(document.getElementById('stat-cha').value),
      };

      if (id && hasAtribut) await api.updateAtribut(karakter.id, stats);
      else await api.createAtribut(stats).catch(() => api.updateAtribut(karakter.id, stats));

      toast(id ? 'Karakter diperbarui!' : 'Karakter dibuat!', 'success');
      closeModal();
      loadKarakter();
    } catch(e) { toast(e.message, 'error'); }
  }

  async function hapusKarakter(id) {
    if (!confirm('Hapus karakter ini?')) return;
    try {
      await api.deleteKarakter(id);
      toast('Karakter dihapus', 'success');
      loadKarakter();
    } catch(e) { toast(e.message, 'error'); }
  }

  async function showDetail(id) {
    try {
      const res = await api.getKarakterById(id);
      const k   = res.data;
      const mod = s => Math.floor((s - 10) / 2);
      const fm  = m => (m >= 0 ? `+${m}` : `${m}`);

      document.getElementById('detail-nama').textContent = k.nama_karakter;
      const stats = ['strength','dexterity','constitution','intelligence','wisdom','charisma'];
      const labels = ['Strength','Dexterity','Constitution','Intelligence','Wisdom','Charisma'];
      const colors = ['text-red-400','text-green-400','text-yellow-400','text-blue-400','text-purple-400','text-pink-400'];

      document.getElementById('detail-content').innerHTML = `
        <div class="flex gap-4 mb-5">
          ${k.gambar_url ? `<img src="${k.gambar_url}" class="w-24 h-32 object-cover rounded-lg border-2 border-yellow-800">` : ''}
          <div>
            <div class="text-sm text-gray-400">${esc(k.race)} · ${esc(k.class)} · Level ${k.level}</div>
            <div class="text-sm text-gray-500">Pemain: ${esc(k.pemain_username)}</div>
            ${k.background ? `<div class="text-xs text-gray-500 mt-1">Background: ${esc(k.background)}</div>` : ''}
            ${k.alignment  ? `<div class="text-xs text-indigo-400 mt-0.5">${esc(k.alignment)}</div>` : ''}
            <div class="mt-3 px-3 py-1.5 rounded-lg inline-block text-sm font-bold text-green-400" style="background:#052e16">
              HP Max: ${k.max_hp}
            </div>
          </div>
        </div>
        ${k.strength != null ? `
        <div class="grid grid-cols-3 gap-3 mb-4">
          ${stats.map((s, i) => `
            <div class="p-3 rounded-lg text-center" style="background:#0f172a">
              <div class="text-xs font-bold ${colors[i]}">${labels[i]}</div>
              <div class="text-2xl font-bold mt-1">${k[s]}</div>
              <div class="text-sm text-gray-400">${fm(mod(k[s]))}</div>
            </div>
          `).join('')}
        </div>` : '<p class="text-gray-500 text-sm">Belum ada atribut</p>'}
        <a href="/session.html?karakter_id=${k.id}" class="block w-full btn-gold text-center py-2.5 rounded-lg font-semibold text-sm mt-2">
          <i class="fas fa-play mr-2"></i>Mulai Sesi Bermain
        </a>
      `;
      document.getElementById('modal-detail').classList.remove('hidden');
    } catch(e) { toast(e.message, 'error'); }
  }

  function updateMod(stat, val) {
    const m = Math.floor((parseInt(val) - 10) / 2);
    document.getElementById(`mod-${stat}`).textContent = m >= 0 ? `+${m}` : `${m}`;
  }

  function previewImg(input) {
    if (!input.files[0]) return;
    const prev = document.getElementById('img-preview');
    prev.src = URL.createObjectURL(input.files[0]);
    prev.classList.remove('hidden');
  }

  function closeModal() { document.getElementById('modal-karakter').classList.add('hidden'); }
  function closeDetail() { document.getElementById('modal-detail').classList.add('hidden'); }

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function toast(msg, type = 'success') {
    const el = document.createElement('div');
    el.className = `toast text-sm font-medium ${type === 'success' ? 'bg-green-800 text-green-100' : 'bg-red-900 text-red-100'}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  document.getElementById('modal-karakter').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
  document.getElementById('modal-detail').addEventListener('click', e => { if (e.target === e.currentTarget) closeDetail(); });

  init();
</script>
</body>
</html>
