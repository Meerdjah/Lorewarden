services:
  postgres:
    image: postgres:15-alpine
    container_name: lorewarden_db
    environment:
      POSTGRES_DB: lorewarden
      POSTGRES_USER: lorewarden_user
      POSTGRES_PASSWORD: lorewarden_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lorewarden_user -d lorewarden"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: lorewarden_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
